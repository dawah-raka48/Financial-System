<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>السجل</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body class="dashboard-page">

<div class="dashboard">

<!-- =======================
Header
======================= -->

<header class="topbar">

<div class="left">

<button
class="menu-btn"
onclick="location.href='dashboard.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

<div class="center">

<h2>

السجل

</h2>

<p>

جميع الحركات المالية

</p>

</div>

<div class="right">

<button
class="setting-btn"
onclick="location.href='settings.html'">

<i class="fa-solid fa-gear"></i>

</button>

</div>

</header>

<!-- =======================
Search
======================= -->

<section class="history-filter">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="بحث باسم المستفيد أو البيان">

</div>

<div class="filter-row">

<input
type="month"
id="monthFilter">

<button
id="printMonth"
class="action blue">

<i class="fa-solid fa-print"></i>

<span>

طباعة

</span>

</button>

</div>

</section>

<!-- =======================
Transactions
======================= -->

<section
class="history-list"
id="historyContainer">

<!-- يتم تعبئته بالجافاسكربت -->

</section>
<!-- =======================
Edit Modal
======================= -->

<div class="modal" id="editModal">

    <div class="modal-card">

        <div class="modal-header">

            <h3>تعديل الحركة</h3>

            <button id="closeEditModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label>التاريخ</label>

                <input
                    type="date"
                    id="editDate">

            </div>

            <div class="form-group">

                <label>نوع الحركة</label>

                <select id="editType">

                    <option value="expense">صرف</option>

                    <option value="income">إيداع</option>

                </select>

            </div>

            <div class="form-group">

                <label>طريقة الدفع</label>

                <select id="editPayment">

                    <option value="cash">كاش</option>

                    <option value="bank">بنك</option>

                </select>

            </div>

            <div class="form-group">

                <label>المبلغ</label>

                <input
                    type="number"
                    id="editAmount">

            </div>

            <div class="form-group full">

                <label>المستفيد</label>

                <input
                    type="text"
                    id="editPerson">

            </div>

            <div class="form-group full">

                <label>البيان</label>

                <textarea
                    id="editNote"
                    rows="3"></textarea>

            </div>

        </div>

        <div class="modal-buttons">

            <button
                class="save-btn"
                id="updateTransaction">

                حفظ التعديل

            </button>

        </div>

    </div>

</div>

<!-- =======================
Bottom Navigation
======================= -->

<nav class="bottom-nav">

<button
onclick="location.href='dashboard.html'">

<i class="fa-solid fa-house"></i>

<span>

الرئيسية

</span>

</button>

<button class="active">

<i class="fa-solid fa-clock-rotate-left"></i>

<span>

السجل

</span>

</button>

<button
onclick="location.href='settings.html'">

<i class="fa-solid fa-gear"></i>

<span>

الإعدادات

</span>

</button>

</nav>

</div>

<script src="js/storage.js"></script>

<script src="js/history.js"></script>

</body>

</html>
